<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Smart Medicine Reminder</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="glass-card auth-box">
            <h2>Create Account</h2>
            <form id="signupForm">
                <div class="form-group">
                    <label for="name"><i class="fas fa-user"></i> Name</label>
                    <input type="text" id="name" class="form-control" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter email" required>
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Create password" required>
                </div>
                <div id="signupError" style="color: #ef4444; margin-bottom: 1rem; display: none;"></div>
                <button type="submit" class="btn">Sign Up</button>
                <a href="login.html" class="btn btn-secondary">Back to Login</a>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
